<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Duty Slip Generator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="app-shell">
  {% include 'navbar.html' %}

  <main class="page-content">
    <section class="card">
      <header>
        <h1 class="page-title">Duty Slip Generator</h1>
        <p class="page-subtitle">Craft a perfectly aligned duty slip that mirrors your official template.</p>
      </header>

      <form class="generator-form" action="/generate" method="post">
        <section>
          <h3 class="section-title">Customer & Booking</h3>
          <div class="form-grid form-grid--two">
            <div class="field-group">
              <label for="customer_name">Customer Name</label>
              <input type="text" id="customer_name" name="customer_name" required>
            </div>
            <div class="field-group">
              <label for="company_name">Company Name</label>
              <input type="text" id="company_name" name="company_name">
            </div>
            <div class="field-group">
              <label for="date">Date</label>
              <input type="date" id="date" name="date" required>
            </div>
            <div class="field-group">
              <label for="duty_slip_no">Duty Slip No</label>
              <input type="text" id="duty_slip_no" name="duty_slip_no">
            </div>
          </div>
        </section>

        <section>
          <h3 class="section-title">Vehicle Details</h3>
          <div class="form-grid form-grid--two">
            <div class="field-group">
              <label for="vehicle_type">Type of Vehicle</label>
              <input type="text" id="vehicle_type" name="vehicle_type">
            </div>
            <div class="field-group">
              <label for="vehicle_no">Vehicle No</label>
              <input type="text" id="vehicle_no" name="vehicle_no">
            </div>
          </div>
        </section>

        <section>
          <h3 class="section-title">Distance & Time</h3>
          <div class="form-grid form-grid--three">
            <div class="field-group">
              <label for="starting_km">Starting KM</label>
              <input type="text" id="starting_km" name="starting_km">
            </div>
            <div class="field-group">
              <label for="closing_km">Closing KM</label>
              <input type="text" id="closing_km" name="closing_km">
            </div>
            <div class="field-group">
              <label for="total_km">Total KM</label>
              <input type="text" id="total_km" name="total_km">
            </div>
            <div class="field-group">
              <label for="starting_time">Starting Time</label>
              <input type="time" id="starting_time" name="starting_time">
            </div>
            <div class="field-group">
              <label for="closing_time">Closing Time</label>
              <input type="time" id="closing_time" name="closing_time">
            </div>
            <div class="field-group">
              <label for="total_time">Total Time</label>
              <input type="text" id="total_time" name="total_time">
            </div>
          </div>
        </section>

        <section>
          <h3 class="section-title">Trip Notes</h3>
          <div class="form-grid form-grid--two">
            <div class="field-group">
              <label for="dn">DN</label>
              <input type="text" id="dn" name="dn">
            </div>
            <div class="field-group">
              <label for="remarks">Remarks</label>
              <input type="text" id="remarks" name="remarks">
            </div>
          </div>
          <div class="field-group">
            <label for="route_covered">Route Covered</label>
            <div class="textarea-with-actions">
              <textarea id="route_covered" name="route_covered" rows="4"></textarea>
              <div class="mic-buttons">
                <button type="button" class="btn btn-soft" id="micStartBtn">🎙 Start</button>
                <button type="button" class="btn btn-ghost" id="micStopBtn" disabled>⏹ Stop</button>
              </div>
            </div>
            <span class="hint">Use voice input to capture the full journey narrative.</span>
          </div>
        </section>

        <section>
          <h3 class="section-title">Driver</h3>
          <div class="form-grid">
            <div class="field-group">
              <label for="driver_name">Driver Name</label>
              <select id="driver_name" name="driver_name" required>
                <option value="">-- Select Driver --</option>
                {% for d in driver_list %}
                  <option value="{{ d }}">{{ d }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
        </section>

        <div>
          <input class="btn btn-primary" type="submit" value="Generate Duty Slip">
        </div>
      </form>
    </section>
  </main>

  <!-- JAVASCRIPT FOR WEB SPEECH API -->
  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.continuous = true;   // keep recording until manual stop
      recognition.interimResults = false;

      const micStartBtn = document.getElementById('micStartBtn');
      const micStopBtn = document.getElementById('micStopBtn');
      const routeCoveredInput = document.getElementById('route_covered');

      micStartBtn.addEventListener('click', () => {
        recognition.start();
        micStartBtn.disabled = true;
        micStopBtn.disabled = false;
        console.log('Recording started...');
      });

      micStopBtn.addEventListener('click', () => {
        recognition.stop();
        micStartBtn.disabled = false;
        micStopBtn.disabled = true;
        console.log('Recording stopped...');
      });

      recognition.addEventListener('result', (e) => {
        const transcript = e.results[e.results.length - 1][0].transcript;
        console.log('Transcript:', transcript);
        // Append recognized text, so we don't overwrite previous sentences
        routeCoveredInput.value += transcript + " ";
      });

      recognition.addEventListener('end', () => {
        console.log('Recognition ended or mic was stopped.');
      });
    } else {
      console.warn('SpeechRecognition not supported in this browser.');
      // Hide or disable the mic buttons
      document.getElementById('micStartBtn').classList.add('is-hidden');
      document.getElementById('micStopBtn').classList.add('is-hidden');
    }
  </script>
  <script>
    // KM calculation
    const startKm = document.getElementById("starting_km");
    const closeKm = document.getElementById("closing_km");
    const totalKm = document.getElementById("total_km");
  
    function updateKM() {
      const start = parseFloat(startKm.value);
      const end = parseFloat(closeKm.value);
      if (!isNaN(start) && !isNaN(end)) {
        const total = end - start;
        totalKm.value = total >= 0 ? total : '';
      }
    }
  
    startKm.addEventListener('input', updateKM);
    closeKm.addEventListener('input', updateKM);
  
    // Time calculation
    const startTime = document.getElementById("starting_time");
    const closeTime = document.getElementById("closing_time");
    const totalTime = document.getElementById("total_time");
  
    function updateTime() {
      if (startTime.value && closeTime.value) {
        const start = new Date(`1970-01-01T${startTime.value}:00`);
        const end = new Date(`1970-01-01T${closeTime.value}:00`);
  
        let diffMs = end - start;
        if (diffMs < 0) diffMs += 24 * 60 * 60 * 1000; // handle overnight shifts
  
        const hours = Math.floor(diffMs / 3600000);
        const minutes = Math.floor((diffMs % 3600000) / 60000);
  
        totalTime.value = `${hours}h ${minutes}m`;
      }
    }
  
    startTime.addEventListener('change', updateTime);
    closeTime.addEventListener('change', updateTime);
  </script>
  
</body>
</html>
