<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="auth-shell">
  <div class="card auth-card">
    <div class="brand-badge brand-badge--center">
      <strong>Duty Slip</strong>
    </div>
    <h1 class="auth-title">Osprey Travels</h1>
    <p class="auth-subtitle">Enter your credentials to access the dashboard.</p>

    <form class="form-grid" action="/admin_login" method="post">
      <div class="field-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <input class="btn btn-primary" type="submit" value="Login">
      {% if error %}
        <p class="message error">{{ error }}</p>
      {% endif %}
    </form>
  </div>
</body>
</html>
